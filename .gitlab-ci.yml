pages:
  image: node:24-slim
  before_script:
    - npm config set strict-ssl false
    - npm install
  script:
    - npm run build
    - mv dist public   # GitLab Pages requires artifacts in a folder named 'public'
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
